# Test: scroll element with vertical and horizontal directions
# Verifies scrollable containers with overflowing children
riss: "0.1"
meta:
  name: "Test - Scroll Basic"
  viewport: { width: 390, height: 844 }
  theme:
    mode: light
    accent: "#2563EB"

