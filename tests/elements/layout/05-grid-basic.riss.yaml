# Test: grid element with different column counts and gap tokens
# Verifies grid layout with 1, 2, 3, 4, and 6 columns
riss: "0.1"
meta:
  name: "Test - Grid Basic"
  viewport: { width: 390, height: 844 }
  theme:
    mode: light
    accent: "#2563EB"

screens:
  - id: grid_columns
    title: "Grid Column Counts"
    path: /test/grid-columns
    children:
      - type: scroll
        direction: vertical
        children:
          # 1 column
          - type: section
            title: "columns: 1"
            children:
              - type: grid
                columns: 1
                gap: sm
                children:
                  - type: card
                    padding: md
                    children:
                      - type: text
                        content: "Registrer ny pasient"
                  - type: card
                    padding: md
                    children:
                      - type: text
                        content: "Se timebestillinger"
                  - type: card
                    padding: md
                    children:
                      - type: text
                        content: "Laboratorieresultater"

          # 2 columns
          - type: section
            title: "columns: 2"
            children:
              - type: grid
                columns: 2
                gap: sm
                children:
