# Test: scroll element with ALL properties
# Verifies height constraints, nesting within rows, horizontal with card widths,
# vertical scroll with grow:1
riss: "0.1"
meta:
  name: "Test - Scroll All Properties"
  viewport: { width: 390, height: 844 }
  theme:
    mode: light
    accent: "#2563EB"

screens:
  # Screen 1: Vertical scroll with height constraint
  - id: scroll_height_constrained
    title: "Scroll Height Constrained"
    path: /test/scroll-constrained
    children:
      - type: stack
        gap: md
        padding: md
        children:
          - type: text
            variant: h2
            content: "Handleliste"
          - type: text
            variant: body-sm
            color: text-secondary
            content: "Scroll innenfor en boks med fast hoyde"

          # Vertical scroll with explicit height
          - type: scroll
            direction: vertical
            height: 300
            children:
              - type: stack
                gap: sm
                padding: sm
                children:
                  - type: row
                    gap: sm
                    align: center
                    padding: sm
                    background: surface
                    rounded: md
                    children:
                      - type: icon
                        name: check
                        color: success
                      - type: text
                        content: "Melk, 1 liter"
