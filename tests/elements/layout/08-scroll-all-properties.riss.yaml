                    padding: sm
                    background: surface
                    rounded: md
                    children:
                      - type: icon
                        name: check
                        color: text-disabled
                      - type: text
                        content: "Poteter, 2kg"
                  - type: row
                    gap: sm
                    align: center
                    padding: sm
                    background: surface
                    rounded: md
                    children:
                      - type: icon
                        name: check
                        color: text-disabled
                      - type: text
