# Test: stack element with ALL properties
# Verifies gap, align, justify, padding, sizing, grow, shrink,
# background, border, rounded, elevation, overflow
riss: "0.1"
meta:
  name: "Test - Stack All Properties"
  viewport: { width: 390, height: 844 }
  theme:
    mode: light
    accent: "#2563EB"

screens:
  # Screen 1: Alignment combinations
  - id: stack_alignment
    title: "Stack Alignment"
    path: /test/stack-align
    children:
      - type: scroll
        direction: vertical
        children:
          # align: start
          - type: section
            title: "align: start"
            children:
              - type: stack
                gap: sm
                align: start
                padding: md
                background: surface
                border: true
                children:
                  - type: text
                    content: "Kort tekst"
                  - type: text
                    content: "Noe lengre tekst her"
                  - type: text
                    content: "Enda mer innhold som viser venstrejustering"

          # align: center
          - type: section
            title: "align: center"
            children:
              - type: stack
                gap: sm
                align: center
                padding: md
                background: surface
                border: true
                children:
                  - type: text
                    content: "Sentrert kort"
                  - type: text
                    content: "Litt lengre sentrert tekst"
                  - type: text
                    content: "Den lengste linjen av alle tre"

          # align: end
          - type: section
            title: "align: end"
            children:
              - type: stack
                gap: sm
                align: end
                padding: md
                background: surface
                border: true
                children:
                  - type: text
                    content: "Hoyrejustert"
                  - type: text
                    content: "Lengre hoyrejustert tekst"
                  - type: text
                    content: "Justert mot hoyrekant"

          # align: stretch
          - type: section
            title: "align: stretch"
            children:
              - type: stack
                gap: sm
                align: stretch
                padding: md
                background: surface
                border: true
                children:
                  - type: text
                    content: "Strukket element A"
                  - type: text
                    content: "Strukket element B"

  # Screen 2: Justify combinations
  - id: stack_justify
    title: "Stack Justify"
    path: /test/stack-justify
    children:
      # justify: start
      - type: stack
        gap: sm
        justify: start
        height: 300
        padding: md
        background: surface
        border: true
        children:
          - type: text
            content: "justify: start - Topp"
          - type: text
            content: "Element to"
          - type: text
            content: "Element tre"

      # justify: center
      - type: stack
        gap: sm
        justify: center
        height: 300
        padding: md
        background: surface
        border: true
        children:
          - type: text
            content: "justify: center - Midten"
          - type: text
            content: "Element to"
          - type: text
            content: "Element tre"

      # justify: end
      - type: stack
        gap: sm
        justify: end
        height: 300
        padding: md
        background: surface
        border: true
        children:
          - type: text
            content: "justify: end - Bunnen"
          - type: text
            content: "Element to"
          - type: text
            content: "Element tre"

  # Screen 3: Justify space distribution
  - id: stack_justify_space
    title: "Stack Justify Space"
    path: /test/stack-justify-space
    children:
      # justify: between
      - type: stack
        justify: between
        height: 250
        padding: md
        background: surface
        border: true
        children:
          - type: text
            content: "between - Forste"
          - type: text
            content: "between - Andre"
          - type: text
            content: "between - Tredje"

      # justify: around
      - type: stack
        justify: around
        height: 250
        padding: md
        background: surface
        border: true
        children:
          - type: text
            content: "around - Forste"
          - type: text
            content: "around - Andre"
          - type: text
            content: "around - Tredje"

      # justify: evenly
      - type: stack
        justify: evenly
        height: 250
        padding: md
        background: surface
        border: true
        children:
          - type: text
            content: "evenly - Forste"
          - type: text
            content: "evenly - Andre"
          - type: text
            content: "evenly - Tredje"

  # Screen 4: Padding and margin variations
  - id: stack_spacing
    title: "Stack Spacing"
    path: /test/stack-spacing
    children:
      - type: scroll
        direction: vertical
        children:
          # padding only
          - type: section
            title: "padding: lg"
            children:
              - type: stack
                padding: lg
                background: surface
                border: true
                children:
                  - type: text
                    content: "Innhold med stor padding"

          # padding-x and padding-y
          - type: section
            title: "padding-x: xl, padding-y: sm"
            children:
              - type: stack
                padding-x: xl
                padding-y: sm
                background: surface
                border: true
                children:
                  - type: text
                    content: "Bredere horisontal padding"

          # margin
          - type: section
            title: "margin: lg"
            children:
              - type: stack
                margin: lg
                padding: md
                background: surface
                border: true
                children:
                  - type: text
                    content: "Element med ytre margin"

  # Screen 5: Sizing with width/height fractions
  - id: stack_sizing
    title: "Stack Sizing"
    path: /test/stack-sizing
    children:
      - type: scroll
        direction: vertical
        children:
          # width: full
          - type: stack
            width: "full"
            padding: md
            background: surface
            border: true
            children:
              - type: text
                content: "width: full"

          # width: half
          - type: stack
            width: "half"
            padding: md
            background: surface
            border: true
            children:
              - type: text
                content: "width: half"

          # width: 1/3
          - type: stack
            width: "1/3"
            padding: md
            background: surface
            border: true
            children:
              - type: text
                content: "width: 1/3"

          # width: 2/3
          - type: stack
            width: "2/3"
            padding: md
            background: surface
            border: true
            children:
              - type: text
                content: "width: 2/3"

          # width: 1/4
          - type: stack
            width: "1/4"
            padding: md
            background: surface
            border: true
            children:
              - type: text
                content: "1/4"

          # width: 3/4
          - type: stack
            width: "3/4"
            padding: md
            background: surface
            border: true
            children:
              - type: text
                content: "width: 3/4"

          # width: pixel value
          - type: stack
            width: 180
            padding: md
            background: surface
            border: true
            children:
              - type: text
                content: "width: 180px"

          # height: explicit pixel
          - type: stack
            height: 120
            width: "full"
            padding: md
            background: surface
            border: true
            justify: center
            children:
              - type: text
                content: "height: 120px"

  # Screen 6: Grow, shrink, background, border, rounded, elevation, overflow
  - id: stack_visual
    title: "Stack Visual Properties"
    path: /test/stack-visual
    children:
      - type: scroll
        direction: vertical
        children:
          # grow and shrink in a parent row
          - type: section
            title: "grow and shrink"
            children:
              - type: row
                gap: sm
                height: 80
                children:
                  - type: stack
                    grow: 1
                    padding: sm
                    background: surface
                    border: true
                    justify: center
                    children:
                      - type: text
                        content: "grow: 1"
                  - type: stack
                    grow: 2
                    padding: sm
                    background: surface
                    border: true
                    justify: center
                    children:
                      - type: text
                        content: "grow: 2"
                  - type: stack
                    shrink: 0
                    width: 80
                    padding: sm
                    background: surface
                    border: true
                    justify: center
                    children:
                      - type: text
                        content: "shrink: 0"

          # background color
          - type: section
            title: "background"
            children:
              - type: stack
                gap: sm
                children:
                  - type: stack
                    padding: md
                    background: surface
                    children:
                      - type: text
                        content: "background: surface"
                  - type: stack
                    padding: md
                    background: accent-soft
                    children:
                      - type: text
                        content: "background: accent-soft"

          # border: true vs object form
          - type: section
            title: "border"
            children:
              - type: stack
                gap: sm
                children:
                  - type: stack
                    padding: md
                    border: true
                    children:
                      - type: text
                        content: "border: true"
                  - type: stack
                    padding: md
                    border:
                      color: accent
                      width: 2
                      style: dashed
                      sides: all
                    children:
                      - type: text
                        content: "border: dashed accent 2px"
                  - type: stack
                    padding: md
                    border:
                      color: error
                      width: 1
                      style: solid
                      sides: [top, bottom]
                    children:
                      - type: text
                        content: "border: top+bottom only"

          # rounded tokens
          - type: section
            title: "rounded"
            children:
              - type: row
                gap: sm
                wrap: true
                children:
                  - type: stack
                    padding: sm
                    background: surface
                    border: true
                    rounded: none
                    children:
                      - type: text
                        variant: caption
                        content: "none"
                  - type: stack
                    padding: sm
                    background: surface
                    border: true
                    rounded: sm
                    children:
                      - type: text
                        variant: caption
                        content: "sm"
                  - type: stack
                    padding: sm
                    background: surface
                    border: true
                    rounded: md
                    children:
                      - type: text
                        variant: caption
                        content: "md"
                  - type: stack
                    padding: sm
                    background: surface
                    border: true
                    rounded: lg
                    children:
                      - type: text
                        variant: caption
                        content: "lg"
                  - type: stack
                    padding: sm
                    background: surface
                    border: true
                    rounded: xl
                    children:
                      - type: text
                        variant: caption
                        content: "xl"
                  - type: stack
                    padding: sm
                    width: 60
                    height: 60
                    background: surface
                    border: true
                    rounded: full
                    align: center
                    justify: center
                    children:
                      - type: text
                        variant: caption
                        content: "full"

          # elevation
          - type: section
            title: "elevation"
            children:
              - type: stack
                gap: md
                children:
                  - type: stack
                    padding: md
                    elevation: none
                    background: surface
                    rounded: md
                    children:
                      - type: text
                        content: "elevation: none"
                  - type: stack
                    padding: md
                    elevation: sm
                    background: surface
                    rounded: md
                    children:
                      - type: text
                        content: "elevation: sm"
                  - type: stack
                    padding: md
                    elevation: md
                    background: surface
                    rounded: md
                    children:
                      - type: text
                        content: "elevation: md"
                  - type: stack
                    padding: md
                    elevation: lg
                    background: surface
                    rounded: md
                    children:
                      - type: text
                        content: "elevation: lg"

          # overflow
          - type: section
            title: "overflow"
            children:
              - type: stack
                gap: sm
                children:
                  - type: stack
                    height: 60
                    padding: sm
                    border: true
                    overflow: visible
                    children:
                      - type: text
                        content: "overflow: visible - Denne teksten er lang nok til at den kan ga utenfor boksen og vises utenfor grensene"
                  - type: stack
                    height: 60
                    padding: sm
                    border: true
                    overflow: hidden
                    children:
                      - type: text
                        content: "overflow: hidden - Denne teksten klippes og vises ikke utenfor boksen selv om den er veldig lang"
                  - type: stack
                    height: 60
                    padding: sm
                    border: true
                    overflow: scroll
                    children:
                      - type: text
                        content: "overflow: scroll - Denne teksten kan scrolles innenfor boksen dersom den overskrider hoyde"
