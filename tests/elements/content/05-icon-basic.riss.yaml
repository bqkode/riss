# Test: Icon element — common icons, sizes, and colors
# Verifies rendering of frequently used icons at different sizes and color tokens.

riss: "0.1"
meta:
  name: "Test - Icon Basic"
  viewport: { width: 390, height: 844 }
  theme:
    mode: light
    accent: "#2563EB"

screens:
