# Test: list element with divider options
# Verifies list rendering with dividers: true/false and inset-dividers: true/false.
riss: "0.1"
meta:
  name: "Test - List Basic"
  viewport: { width: 390, height: 844 }
  theme:
    mode: light
    accent: "#2563EB"

screens:
  - id: list_dividers
    title: "List - Divider Variants"
    path: /test/list-dividers
    children:
      - type: scroll
        direction: vertical
        children:
          # dividers: true (default)
          - type: section
            title: "dividers: true (default)"
            children:
              - type: list
                dividers: true
                children:
                  - type: list-item
                    title: "Kari Nordmann"
                    subtitle: "Product Manager"
                  - type: list-item
                    title: "Ola Hansen"
                    subtitle: "Software Engineer"
                  - type: list-item
                    title: "Erik Bakke"
                    subtitle: "UX Designer"
                  - type: list-item
                    title: "Ingrid Solberg"
                    subtitle: "Data Analyst"

          # dividers: false
          - type: section
            title: "dividers: false"
            children:
              - type: list
                dividers: false
                children:
                  - type: list-item
                    title: "Morning standup"
                    subtitle: "09:00 - 09:15"
                  - type: list-item
                    title: "Sprint planning"
                    subtitle: "10:00 - 11:00"
                  - type: list-item
                    title: "Design review"
                    subtitle: "13:30 - 14:00"
                  - type: list-item
                    title: "Retrospective"
                    subtitle: "15:00 - 16:00"

          # inset-dividers: true
          - type: section
            title: "inset-dividers: true"
            children:
              - type: list
                dividers: true
                inset-dividers: true
                children:
                  - type: list-item
                    leading: avatar
                    title: "Bjorn Eriksen"
                    subtitle: "Sent you a message"
