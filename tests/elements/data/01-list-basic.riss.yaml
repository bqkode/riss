                    leading: avatar
                    title: "Astrid Haugen"
                    subtitle: "Shared a document"
                  - type: list-item
                    leading: avatar
                    title: "Magnus Vold"
                    subtitle: "Commented on your post"

          # inset-dividers: false
          - type: section
            title: "inset-dividers: false"
            children:
              - type: list
                dividers: true
                inset-dividers: false
                children:
                  - type: list-item
                    leading: avatar
                    title: "Camilla Nordby"
                    subtitle: "Online now"
