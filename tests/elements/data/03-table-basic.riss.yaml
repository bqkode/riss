# Test: table element with basic columns and rows
# Verifies table rendering with Norwegian names and column width fractions.
riss: "0.1"
meta:
  name: "Test - Table Basic"
  viewport: { width: 390, height: 844 }
  theme:
    mode: light
    accent: "#2563EB"

screens:
  - id: table_basic
    title: "Table - Basic"
    path: /test/table-basic
    children:
      - type: stack
        padding: md
        gap: md
        children:
          - type: text
            variant: h3
            content: "Team Members"

          - type: table
            columns:
              - label: "Name"
                width: "1/3"
              - label: "Role"
                width: "1/3"
              - label: "Status"
                width: "1/3"
            rows:
              - ["Kari Nordmann", "Product Manager", "Active"]
              - ["Ola Hansen", "Backend Developer", "Active"]
              - ["Erik Bakke", "UX Designer", "On Leave"]
              - ["Ingrid Solberg", "Data Analyst", "Active"]
              - ["Magnus Vold", "DevOps Engineer", "Inactive"]
